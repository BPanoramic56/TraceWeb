<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E"> -->
  <link rel="icon" href="src/assets/images/TraceMountain.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trace</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <!-- Supabase (must load before Babel/React scripts execute) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --bg2:          #171717;
      --text:         #ffffff;
      --muted:        #a1a1aa;
      --accent:       #6366f1;
      --accent-light: #818cf8;
      --deactivate:   #2f2f2f;
      --border:       rgba(255,255,255,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-12px) rotate(-2deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes progressBar {
      from { width: 0; }
      to   { width: 100%; }
    }

    .animate-fade-up { animation: fadeUp 0.7s ease forwards; }
    .animate-fade-in { animation: fadeIn 0.8s ease forwards; }
    .animate-float   { animation: float 5s ease-in-out infinite; }

    .delay-1 { animation-delay: 0.10s; opacity: 0; }
    .delay-2 { animation-delay: 0.22s; opacity: 0; }
    .delay-3 { animation-delay: 0.34s; opacity: 0; }
    .delay-4 { animation-delay: 0.46s; opacity: 0; }
    .delay-5 { animation-delay: 0.58s; opacity: 0; }
    .delay-6 { animation-delay: 0.70s; opacity: 0; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Supabase config ─────────────────────────────────────────────
// Replace these with your actual Supabase project values
const SUPABASE_URL    = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON   = 'YOUR_ANON_KEY';

// ─── Heroicons (outline, 24px) ────────────────────────────────────
// Using raw SVG paths from Heroicons v2 — no build step needed.
const HI = (path, size = 16) => () => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    {path}
  </svg>
);

const Icons = {
  // BoltIcon
  Bolt: HI(<path strokeLinecap="round" strokeLinejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/>, 14),

  // SparklesIcon
  Sparkle: HI(<path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/>, 14),
  
  // Apple (kept as brand SVG — Heroicons doesn't include it)
  Apple: () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
  ),

  // EnvelopeIcon
  Mail: HI(<path strokeLinecap="round" strokeLinejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>, 14),

  // QuestionMarkCircleIcon
  Support: HI(<><path strokeLinecap="round" strokeLinejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z"/></>, 14),

  // LockClosedIcon
  Lock: HI(<path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>),
  
  // EyeSlashIcon
  EyeOff: HI(<><path strokeLinecap="round" strokeLinejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></>),
  
  // EyeIcon
  Eye: HI(<><path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></>),
  
  // CheckCircleIcon (large)
  CheckCircle: HI(<path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>, 48),
  
  // ExclamationCircleIcon (large)
  AlertCircle: HI(<><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></>, 48),
  
  // ChevronTriangleUpDown / used for mountain feel — MapPinIcon
  Mountain: HI(<path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/>, 14),
};

// ─── Phone mockup screens ─────────────────────────────────────────
const screens = [
  {
    bg: 'linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
    accent: '#6366f1', label: 'Dashboard',
    items: [
      { w:'60%', h:10, top:18, left:18, opacity:1 },
      { w:'40%', h:8,  top:36, left:18, opacity:0.5 },
      { w:'85%', h:56, top:60, left:'7.5%', opacity:1, card:true, accent:'#6366f1' },
      { w:'38%', h:44, top:130, left:18,   opacity:1, card:true, accent:'#22d3ee' },
      { w:'38%', h:44, top:130, right:18,  opacity:1, card:true, accent:'#a78bfa' },
    ]
  },
  {
    bg: 'linear-gradient(145deg, #0f2027 0%, #203a43 50%, #2c5364 100%)',
    accent: '#22d3ee', label: 'Analytics',
    items: [
      { w:'55%', h:10,  top:18,  left:18,   opacity:1 },
      { w:'80%', h:100, top:44,  left:'10%', opacity:1, card:true, accent:'#22d3ee', chart:true },
      { w:'80%', h:36,  top:158, left:'10%', opacity:1, card:true, accent:'#6366f1' },
      { w:'80%', h:36,  top:204, left:'10%', opacity:1, card:true, accent:'#f59e0b' },
    ]
  },
  {
    bg: 'linear-gradient(145deg, #1a0533 0%, #2d1b69 50%, #11052c 100%)',
    accent: '#a78bfa', label: 'Routes',
    items: [
      { w:'45%', h:10,  top:18, left:18,   opacity:1 },
      { w:'85%', h:180, top:44, left:'7.5%', opacity:1, card:true, accent:'#a78bfa', list:true },
    ]
  }
];

function PhoneMockup({ screen = 0 }) {
  const s = screens[screen];
  return (
    <div style={{
      width:220, height:460, borderRadius:38,
      background:'#111',
      border:'2px solid rgba(255,255,255,0.12)',
      boxShadow:`0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04), 0 0 80px ${s.accent}22`,
      position:'relative', overflow:'hidden', flexShrink:0,
    }}>
      <div style={{ position:'absolute', inset:2, borderRadius:36, background:s.bg, overflow:'hidden' }}>
        {/* Status bar */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 18px 6px', fontSize:9, color:'rgba(255,255,255,0.6)' }}>
          <span>9:41</span>
          <div style={{ display:'flex', gap:4, alignItems:'center' }}>
            <div style={{ width:12, height:6, border:'1px solid rgba(255,255,255,0.5)', borderRadius:2, position:'relative' }}>
              <div style={{ position:'absolute', inset:'1px', right:'3px', background:'rgba(255,255,255,0.7)', borderRadius:1 }}/>
            </div>
          </div>
        </div>
        {s.items.map((item, i) => (
          <div key={i} style={{
            position:'absolute',
            width:item.w, height:item.h,
            top:item.top,
            left:item.left !== undefined ? item.left : 'auto',
            right:item.right !== undefined ? item.right : 'auto',
            borderRadius:item.card ? 14 : 6,
            background:item.card
              ? 'linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02))'
              : `rgba(255,255,255,${item.opacity * 0.7})`,
            border:item.card ? '1px solid rgba(255,255,255,0.08)' : 'none',
            overflow:'hidden',
          }}>
            {item.card && item.accent && (
              <div style={{ position:'absolute', top:10, left:10, width:28, height:28, borderRadius:8, background:`${item.accent}33`, border:`1px solid ${item.accent}55` }}/>
            )}
            {item.chart && (
              <div style={{ position:'absolute', bottom:10, left:10, right:10, display:'flex', alignItems:'flex-end', gap:4, height:50 }}>
                {[0.4,0.7,0.5,0.9,0.6,0.8,1,0.7].map((h, j) => (
                  <div key={j} style={{ flex:1, borderRadius:'3px 3px 0 0', height:`${h*100}%`, background: j===6 ? s.accent : `${s.accent}44` }}/>
                ))}
              </div>
            )}
            {item.list && (
              <div style={{ padding:'44px 14px 14px', display:'flex', flexDirection:'column', gap:10 }}>
                {[1,2,3,4].map(j => (
                  <div key={j} style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:28, height:28, borderRadius:8, background:'rgba(255,255,255,0.08)', flexShrink:0 }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ height:7, background:'rgba(255,255,255,0.4)', borderRadius:4, width:`${60+j*10}%`, marginBottom:4 }}/>
                      <div style={{ height:5, background:'rgba(255,255,255,0.15)', borderRadius:4, width:'50%' }}/>
                    </div>
                    <div style={{ width:16, height:16, borderRadius:4, background:'rgba(255,255,255,0.05)' }}/>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
      {/* Notch */}
      <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:90, height:28, background:'#111', borderRadius:'0 0 20px 20px', zIndex:10 }}/>
      {/* Home indicator */}
      <div style={{ position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)', width:80, height:4, borderRadius:2, background:'rgba(255,255,255,0.25)', zIndex:10 }}/>
    </div>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────
function Nav({ page, setPage }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const isHidden = page === 'reset-password';
  if (isHidden) return null;

  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:1000,
      padding:'0 clamp(20px,5vw,80px)', height:60,
      display:'flex', alignItems:'center', justifyContent:'space-between',
      background: scrolled ? 'rgba(15,15,15,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(20px)' : 'none',
      borderBottom: scrolled ? '1px solid var(--border)' : '1px solid transparent',
      transition:'background 0.4s ease, border-color 0.4s ease',
    }}>
      <button onClick={() => setPage('home')} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{
          width:30, height:30, borderRadius:8, flexShrink:0,
          background:'linear-gradient(135deg, #6366f1, #818cf8)',
          display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:'0 4px 14px rgba(99,102,241,0.4)',
        }}>
          <img
            src="src/assets/images/TraceMountain.png"
            alt="Trace logo"
            style={{ width:30, height:30, borderRadius:8, objectFit:'cover', flexShrink:0 }}
          />
        </div>
        <span style={{ fontFamily:'DM Serif Display, serif', fontSize:18, color:'var(--text)', letterSpacing:'-0.01em' }}>Trace</span>
      </button>

      <div style={{ display:'flex', gap:32, alignItems:'center' }}>
        {['about','privacy'].map(p => (
          <button key={p} onClick={() => setPage(p)} style={{
            background:'none', border:'none', cursor:'pointer',
            color: page === p ? 'var(--text)' : 'var(--muted)',
            fontSize:13, fontFamily:'DM Sans, sans-serif', fontWeight:400,
            letterSpacing:'0.02em', textTransform:'capitalize',
            transition:'color 0.2s', padding:'4px 0',
            borderBottom: page === p ? '1px solid var(--accent)' : '1px solid transparent',
          }}>{p}</button>
        ))}
      </div>
    </nav>
  );
}

// ─── Landing ──────────────────────────────────────────────────────
function Landing({ setPage }) {
  const [activeScreen, setActiveScreen] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setActiveScreen(s => (s+1) % screens.length), 3000);
    return () => clearInterval(t);
  }, []);

  const features = [
    { Icon: Icons.Bolt,     text: 'Lightning-fast interface with zero latency' },
    { Icon: Icons.Sparkle,  text: 'Clean, minimal design that gets out of your way' },
    { Icon: Icons.Mountain, text: 'Built exclusively for iOS — native and beautiful' },
  ];

  return (
    <div style={{ minHeight:'100vh', paddingTop:60 }}>
      <section style={{
        minHeight:'calc(100vh - 60px)',
        display:'flex', alignItems:'center',
        padding:'clamp(40px,8vh,100px) clamp(20px,5vw,80px)',
        position:'relative', overflow:'hidden',
      }}>
        {/* Glows */}
        <div style={{ position:'absolute', top:'10%', right:'5%', width:'50vw', height:'60vh', background:'radial-gradient(ellipse at center, rgba(99,102,241,0.12) 0%, transparent 70%)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', bottom:'10%', left:'5%', width:'30vw', height:'30vh', background:'radial-gradient(ellipse at center, rgba(129,140,248,0.06) 0%, transparent 70%)', pointerEvents:'none' }}/>

        <div style={{ display:'flex', alignItems:'center', gap:'clamp(40px,6vw,100px)', width:'100%', maxWidth:1100, margin:'0 auto', flexWrap:'wrap' }}>
          {/* Left */}
          <div style={{ flex:'1 1 340px', minWidth:0 }}>
            {/* Badge */}
            <div className="animate-fade-up delay-1" style={{ display:'inline-flex', alignItems:'center', gap:8, background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.25)', borderRadius:100, padding:'5px 14px', marginBottom:28 }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent)', animation:'pulse-dot 2s ease-in-out infinite' }}/>
              <span style={{ fontSize:11, color:'var(--accent-light)', letterSpacing:'0.08em', textTransform:'uppercase', fontWeight:500 }}>Live on the App Store</span>
            </div>

            <h1 className="animate-fade-up delay-2" style={{ fontFamily:'DM Serif Display, serif', fontSize:'clamp(38px,5.5vw,72px)', lineHeight:1.05, letterSpacing:'-0.03em', color:'var(--text)', marginBottom:20 }}>
              When Stats<br/>
              <span style={{ background:'linear-gradient(90deg, #a78bfa, var(--accent-light), var(--accent))', backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', animation:'shimmer 6s linear infinite reverse' }}>
                Meet Snow.
              </span>
            </h1>

            <p className="animate-fade-up delay-3" style={{ fontSize:'clamp(15px,1.8vw,17px)', color:'var(--muted)', lineHeight:1.7, maxWidth:420, marginBottom:32 }}>
              Track, Analyze, Trace. Built exclusively for iPhone, designed around how you ski.
            </p>

            {/* Features */}
            <ul className="animate-fade-up delay-4" style={{ listStyle:'none', marginBottom:40, display:'flex', flexDirection:'column', gap:12 }}>
              {features.map(({ Icon, text }) => (
                <li key={text} style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <span style={{ width:28, height:28, borderRadius:8, background:'rgba(99,102,241,0.12)', border:'1px solid rgba(99,102,241,0.2)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, color:'var(--accent-light)' }}>
                    <Icon />
                  </span>
                  <span style={{ fontSize:14, color:'#d4d4d8' }}>{text}</span>
                </li>
              ))}
            </ul>

            {/* CTA */}
            <div className="animate-fade-up delay-5" style={{ display:'flex', gap:14, flexWrap:'wrap' }}>
              {/*ACTIVATED BUTTON - DON'T USE UNTIL APP IS IN THE STORE*/}
              <a href="https://apps.apple.com/us/app/trace-ski-snowboard/id6760786673">
                <button style={{ display:'flex', alignItems:'center', gap:10, background:'linear-gradient(135deg, var(--accent), var(--accent-light))', border:'none', borderRadius:14, padding:'14px 28px', color:'#fff', fontSize:14, fontWeight:500, cursor:'pointer', fontFamily:'DM Sans, sans-serif', boxShadow:'0 8px 30px rgba(99,102,241,0.4)', transition:'transform 0.2s, box-shadow 0.2s' }}
                  onMouseOver={e => { e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow='0 12px 40px rgba(99,102,241,0.5)'; }}
                  onMouseOut={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 8px 30px rgba(99,102,241,0.4)'; }}
                >
                  <Icons.Apple />
                  Download on the App Store
                </button>

// ─── Reset Password Page ──────────────────────────────────────────
// Sole responsibility: receive the Supabase recovery redirect,
// exchange the token from the URL hash, then deep-link back into the app.
function ResetPassword() {
  const [status, setStatus] = useState('loading'); // loading | success | invalid

  useEffect(() => {
    const searchParams = new URLSearchParams(window.location.search);
    const hashParams   = new URLSearchParams(window.location.hash.replace(/^#/, ''));

    const type  = searchParams.get('type')  || hashParams.get('type');
    const code  = searchParams.get('code');
    const error = searchParams.get('error') || hashParams.get('error');

    // Supabase-level error in the URL (e.g. expired link, already used)
    if (error) {
      console.error('Supabase auth error:', error, searchParams.get('error_description'));
      setStatus('invalid');
      return;
    }

    // No recovery signal — someone navigated here directly
    if (!type && !code) {
      setStatus('invalid');
      return;
    }

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const redirect = () => {
      setStatus('success');
      setTimeout(() => { window.location.href = 'trace://reset-password'; }, 800);
    };

    // ── CRITICAL: subscribe to auth state BEFORE anything else ──────
    // When Supabase JS initialises it may exchange the ?code= token
    // synchronously (PKCE) or the #access_token hash (implicit) before
    // React's useEffect even runs. Setting up the listener first ensures
    // we catch the resulting SIGNED_IN / PASSWORD_RECOVERY event
    // regardless of timing.
    const { data: { subscription } } = client.auth.onAuthStateChange((event, session) => {
      // PKCE fires SIGNED_IN; implicit flow fires PASSWORD_RECOVERY
      if ((event === 'SIGNED_IN' || event === 'PASSWORD_RECOVERY') && session) {
        redirect();
      }
    });

    // Also check immediately — the exchange may have already completed
    // before our listener was attached (race condition on fast networks)
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) { redirect(); }
      // If no session yet, the listener above will catch it.
      // Final safety-net: if nothing has fired after 5 s, give up.
      else {
        setTimeout(() => {
          client.auth.getSession().then(({ data: { session } }) => {
            if (!session) setStatus('invalid');
          });
        }, 5000);
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  // ── Shared card wrapper ──
  const Card = ({ children }) => (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:'40px 24px' }}>
      <div className="animate-fade-up delay-1" style={{ maxWidth:360, width:'100%', textAlign:'center' }}>
        <div style={{ display:'flex', justifyContent:'center', marginBottom:28 }}>
          <div style={{
            width:52, height:52, borderRadius:16, flexShrink:0,
            background:'linear-gradient(135deg, #6366f1, #818cf8)',
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:'0 8px 30px rgba(99,102,241,0.3)',
          }}>
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 17l4-8 4 5 3-3 4 6"/>
              <circle cx="19" cy="5" r="2" fill="white" stroke="none"/>
            </svg>
          </div>
        </div>
        {children}
      </div>
    </div>
  );

  if (status === 'loading') return (
    <Card>
      <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
        <div style={{ width:36, height:36, border:'2px solid rgba(99,102,241,0.2)', borderTopColor:'var(--accent)', borderRadius:'50%', animation:'spin 0.8s linear infinite' }}/>
      </div>
      <h2 style={{ fontFamily:'DM Serif Display, serif', fontSize:26, marginBottom:10 }}>Opening Trace…</h2>
      <p style={{ color:'var(--muted)', fontSize:13, lineHeight:1.7 }}>
        Verifying your reset link. You'll be redirected to the app in a moment.
      </p>
    </Card>
  );

  if (status === 'success') return (
    <Card>
      <div style={{ color:'#4ade80', display:'flex', justifyContent:'center', marginBottom:16 }}><Icons.CheckCircle /></div>
      <h2 style={{ fontFamily:'DM Serif Display, serif', fontSize:26, marginBottom:10 }}>Redirecting to Trace</h2>
      <p style={{ color:'var(--muted)', fontSize:13, lineHeight:1.7 }}>
        Link verified. Opening the app now to complete your password reset.
      </p>
      <div style={{ marginTop:20, height:2, background:'rgba(255,255,255,0.06)', borderRadius:1, overflow:'hidden' }}>
        <div style={{ height:'100%', background:'linear-gradient(90deg, var(--accent), var(--accent-light))', borderRadius:1, animation:'progressBar 2s linear forwards' }}/>
      </div>
    </Card>
  );

  // invalid / expired
  return (
    <Card>
      <div style={{ color:'#f87171', display:'flex', justifyContent:'center', marginBottom:16 }}><Icons.AlertCircle /></div>
      <h2 style={{ fontFamily:'DM Serif Display, serif', fontSize:26, marginBottom:10 }}>Link expired</h2>
      <p style={{ color:'var(--muted)', fontSize:13, lineHeight:1.7, marginBottom:24 }}>
        This password reset link is invalid or has already been used. Please request a new one from the app.
      </p>
      <a href="trace://request-reset" style={{ display:'inline-flex', alignItems:'center', gap:8, background:'linear-gradient(135deg, var(--accent), var(--accent-light))', color:'#fff', borderRadius:12, padding:'12px 24px', textDecoration:'none', fontSize:13, fontWeight:500, boxShadow:'0 6px 20px rgba(99,102,241,0.35)' }}>
        Open Trace App
      </a>
    </Card>
  );
}

// ─── App root ─────────────────────────────────────────────────────
function App() {
  // Detect recovery redirect from Supabase email link.
  //
  // Supabase supports two flows depending on project settings:
  //   • PKCE  (default in newer projects): ?code=<code>&type=recovery
  //   • Implicit (legacy):                 #access_token=...&type=recovery
  //
  // We check both the query string and the hash fragment so either works.
  const getInitialPage = () => {
    const search = window.location.search;           // e.g. ?code=abc&type=recovery
    const hash   = window.location.hash;             // e.g. #access_token=...&type=recovery

    const searchParams = new URLSearchParams(search);
    const hashParams   = new URLSearchParams(hash.replace(/^#/, ''));

    const type  = searchParams.get('type')  || hashParams.get('type');
    const code  = searchParams.get('code');          // PKCE code
    const error = searchParams.get('error') || hashParams.get('error');

    // Any recovery signal → show reset page
    if (type === 'recovery' || code || error) return 'reset-password';

    // Also support an explicit /reset-password path if you ever set up routing
    if (window.location.pathname.includes('reset-password')) return 'reset-password';

    return 'home';
  };

  const [page, setPage] = useState(getInitialPage);

  useEffect(() => {
    if (page !== 'reset-password') {
      window.scrollTo({ top:0, behavior:'smooth' });
    }
  }, [page]);

  return (
    <>
      <Nav page={page} setPage={setPage} />
      {page === 'home'           && <Landing       setPage={setPage} />}
      {page === 'about'          && <About         setPage={setPage} />}
      {page === 'privacy'        && <Privacy       setPage={setPage} />}
      {page === 'reset-password' && <ResetPassword              />}

      <style>{`
        @keyframes pulse-dot {
          0%, 100% { opacity:1; transform:scale(1); }
          50%       { opacity:0.4; transform:scale(0.8); }
        }
        @keyframes shimmer {
          0%   { background-position:-200% center; }
          100% { background-position: 200% center; }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:700px) {
          .phone-wrap { order:2; margin-top:40px; }
        }
      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
